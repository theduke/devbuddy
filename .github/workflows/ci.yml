name: ci

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  desktop:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            deps_script: scripts/install-dependencies-linux.sh
            artifact_name: devbuddy-linux
          - os: macos-latest
            deps_script: scripts/install-dependencies-macos.sh
            artifact_name: devbuddy-macos
          - os: windows-latest
            deps_script: scripts/install-dependencies-windows.sh
            artifact_name: devbuddy-windows
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install Dioxus CLI
        run: cargo binstall dioxus-cli --force --no-confirm --locked

      - name: Add cargo bin to PATH on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install platform dependencies
        shell: bash
        run: bash "${{ matrix.deps_script }}"

      - name: Configure OpenSSL for macOS
        if: runner.os == 'macOS'
        shell: bash
        run: echo "PKG_CONFIG_PATH=$(brew --prefix openssl@3)/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build desktop
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            "$HOME/.cargo/bin/dx" build --desktop
          else
            dx build --desktop
          fi
