name: ci

on:
  pull_request:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  desktop:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            deps_script: scripts/install-dependencies-linux.sh
            artifact_name: devbuddy-linux
          - os: macos-latest
            deps_script: scripts/install-dependencies-macos.sh
            artifact_name: devbuddy-macos
          - os: windows-latest
            deps_script: scripts/install-dependencies-windows.sh
            artifact_name: devbuddy-windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install Dioxus CLI
        run: cargo binstall dioxus-cli --no-confirm --locked

      - name: Add cargo bin to PATH on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install platform dependencies
        shell: bash
        run: bash "${{ matrix.deps_script }}"

      - name: Configure OpenSSL for macOS
        if: runner.os == 'macOS'
        shell: bash
        run: echo "PKG_CONFIG_PATH=$(brew --prefix openssl@3)/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build desktop
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            "$HOME/.cargo/bin/dx" build --desktop --release
          else
            dx build --desktop --release
          fi

      - name: Prepare artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifact
          case "$RUNNER_OS" in
            Linux)
              binary="$(find target/dx -path '*/release/linux/app/devbuddy' -type f | head -n 1)"
              cp "$binary" artifact/devbuddy
              ;;
            macOS)
              app_bundle="$(find target/dx -path '*/release/macos/*.app' -type d | head -n 1)"
              cp -R "$app_bundle" artifact/
              ;;
            Windows)
              binary="$(find target/dx -path '*/release/windows/app/devbuddy.exe' -type f | head -n 1)"
              cp "$binary" artifact/devbuddy.exe
              ;;
            *)
              echo "Unsupported runner: $RUNNER_OS" >&2
              exit 1
              ;;
          esac

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifact
          retention-days: 2
