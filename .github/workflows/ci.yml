name: ci

on:
  pull_request:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  desktop:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            deps_script: scripts/install-dependencies-linux.sh
            artifact_name: devbuddy-linux
          - os: macos-latest
            deps_script: scripts/install-dependencies-macos.sh
            artifact_name: devbuddy-macos
          - os: windows-latest
            deps_script: scripts/install-dependencies-windows.sh
            artifact_name: devbuddy-windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli --locked

      - name: Install platform dependencies
        shell: bash
        run: bash "${{ matrix.deps_script }}"

      - name: Configure OpenSSL for macOS
        if: runner.os == 'macOS'
        shell: bash
        run: echo "PKG_CONFIG_PATH=$(brew --prefix openssl@3)/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build desktop
        run: dx build --desktop --release

      - name: Prepare artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifact
          case "$RUNNER_OS" in
            Linux)
              cp target/dx/devbuddy/release/linux/app/devbuddy artifact/devbuddy
              ;;
            macOS)
              cp -R target/dx/devbuddy/release/macos/*.app artifact/
              ;;
            Windows)
              cp target/dx/devbuddy/release/windows/app/devbuddy.exe artifact/devbuddy.exe
              ;;
            *)
              echo "Unsupported runner: $RUNNER_OS" >&2
              exit 1
              ;;
          esac

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifact
          retention-days: 2
